<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <title>Fernanda</title>

    <meta name="description"
        content="Para la mujer más hermosa del universo 💘">

    <meta property="og:title" content="Fernanda">
    <meta property="og:description"
        content="Una galaxia interactiva con palabras de cariño 💖">

    <meta property="og:image" content="og-cover.png">

    <link rel="icon"
        type="image/png"
        href="https://baque2005.github.io/public-files/files/favicon.png">

    <!-- =========================
         ESTILOS
    ========================== -->

    <style>

        html,
        body{
            margin:0;
            height:100%;
            background:#000;
            overflow:hidden;
        }

        #galaxy-canvas{
            position:fixed;
            inset:0;
            width:100%;
            height:100%;
            display:block;
            touch-action:none;
        }

        .pill{
            position:fixed;
            top:10px;
            left:50%;
            transform:translateX(-50%);

            padding:6px 12px;
            border-radius:999px;

            background:rgba(255,255,255,.08);
            border:1px solid rgba(255,255,255,.18);

            color:#fff;
            font:12px system-ui;
        }

        .attribution{
            position:fixed;
            left:10px;
            bottom:10px;

            font-size:11px;
            color:#b9a0ff;

            opacity:.8;

            background:rgba(0,0,0,.35);

            padding:6px 8px;
            border-radius:8px;
        }

        .player{
            position:fixed;
            left:10px;
            right:10px;
            bottom:10px;

            display:flex;
            gap:8px;
            align-items:center;

            padding:8px;

            color:#fff;

            background:rgba(20,15,35,.35);

            border:1px solid rgba(255,255,255,.12);
            border-radius:12px;

            backdrop-filter:blur(6px);
        }

        .player button{
            padding:8px 12px;

            border-radius:10px;
            border:1px solid rgba(255,255,255,.2);

            background:rgba(255,255,255,.08);

            color:#fff;

            cursor:pointer;
        }

        .player input[type=file]{
            display:none;
        }

        .error{
            position:fixed;

            left:10px;
            right:10px;
            bottom:70px;

            padding:10px;

            color:#ffd9f7;

            background:#260015;

            border:1px solid #ff8ae5;
            border-radius:10px;

            font:12px system-ui;

            display:none;
        }

    </style>

    <!-- =========================
         THREE.JS
    ========================== -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

</head>

<body>

    <!-- =========================
         CANVAS PRINCIPAL
    ========================== -->

    <canvas id="galaxy-canvas"></canvas>

    <!-- =========================
         TEXTO SUPERIOR
    ========================== -->

    <div class="pill">
        💛 FERNANDA, LA MUJER MÁS HERMOSA DEL UNIVERSO 💛
    </div>

    <!-- =========================
         CRÉDITOS
    ========================== -->

    <div class="attribution">
        Base: tlanex · Adaptación para Jotab 💫
    </div>

    <!-- =========================
         MENSAJE DE ERROR
    ========================== -->

    <div id="err" class="error"></div>

    <!-- =========================
         REPRODUCTOR
    ========================== -->

    <div class="player">

        <button id="playBtn">
            ▶︎
        </button>

        <span style="font-size:12px; opacity:.9;">
            Elige tu canción 💙🌹♥️
        </span>

        <input type="file"
            id="pickFile"
            accept="audio/*">

        <button id="pickBtn">
            Elegir canción
        </button>

        <audio id="audio" preload="auto">

            <source
                src="Sign_of_the_Times.mp3"
                type="audio/mpeg">

        </audio>

    </div>

    <!-- =========================
         EFECTOS
    ========================== -->

    <canvas id="fx"
        style="
            position:fixed;
            inset:0;
            pointer-events:none;
        ">
    </canvas>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script>

        (function(){

            // =========================
            // ELEMENTOS
            // =========================

            const err = document.getElementById('err');

            const audio = document.getElementById('audio');

            const playBtn = document.getElementById('playBtn');

            const pickBtn = document.getElementById('pickBtn');

            const pickFile = document.getElementById('pickFile');

            // =========================
            // ERROR
            // =========================

            function showError(msg){

                err.textContent = msg;

                err.style.display = 'block';
            }

            // =========================
            // AUDIO
            // =========================

            playBtn.onclick = async () => {

                try{

                    if(audio.paused){

                        await audio.play();

                        playBtn.textContent = '⏸︎';

                    }else{

                        audio.pause();

                        playBtn.textContent = '▶︎';
                    }

                }catch(e){

                    showError(
                        'No se pudo reproducir. Abre este enlace en Chrome o Safari ' +
                        '(no en el navegador interno de WhatsApp) e intenta de nuevo.'
                    );
                }
            };

            // Auto play al tocar pantalla
            // (varios tipos de evento para máxima compatibilidad
            //  en navegadores móviles, incluyendo el de WhatsApp)

            let triedAutoplay = false;

            async function tryPlay(){

                if(triedAutoplay) return;

                triedAutoplay = true;

                try{

                    await audio.play();

                    playBtn.textContent = '⏸︎';

                }catch(e){

                    triedAutoplay = false;

                    showError(
                        'No se pudo reproducir automáticamente. ' +
                        'Toca el botón ▶︎ para escuchar la canción. ' +
                        'Si sigue sin sonar, abre este enlace en Chrome o Safari ' +
                        '(no en el navegador interno de WhatsApp).'
                    );
                }
            }

            document.addEventListener("click", tryPlay, { once:true });
            document.addEventListener("touchend", tryPlay, { once:true });

            // Si después de 4 segundos no ha empezado a sonar,
            // mostramos la pista de "abrir en navegador"

            setTimeout(() => {

                if(audio.paused){

                    showError(
                        'Si no escuchas la música, toca el botón ▶︎. ' +
                        'Si tampoco funciona, abre este enlace en Chrome o Safari ' +
                        '(no en el navegador interno de WhatsApp).'
                    );
                }

            }, 4000);

            // Elegir archivo MP3

            pickBtn.onclick = () => pickFile.click();

            pickFile.onchange = () => {

                if(pickFile.files && pickFile.files[0]){

                    const url =
                        URL.createObjectURL(
                            pickFile.files[0]
                        );

                    audio.src = url;

                    audio.play()
                        .then(() => {

                            playBtn.textContent = '⏸︎';

                        })
                        .catch(() => {});
                }
            };

            // =========================
            // WEBGL CHECK
            // =========================

            try{

                const test =
                    document.createElement('canvas')
                    .getContext('webgl')

                    ||

                    document.createElement('canvas')
                    .getContext('experimental-webgl');

                if(!test){

                    throw new Error();
                }

            }catch(e){

                showError(
                    'WebGL no está disponible.'
                );

                return;
            }

            // =========================
            // THREE.JS
            // =========================

            const canvas =
                document.getElementById(
                    'galaxy-canvas'
                );

            const renderer =
                new THREE.WebGLRenderer({

                    canvas,
                    antialias:true
                });

            renderer.setPixelRatio(
                Math.min(
                    2,
                    window.devicePixelRatio || 1
                )
            );

            renderer.setSize(
                window.innerWidth,
                window.innerHeight
            );

            // =========================
            // ESCENA
            // =========================

            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(
            0x000000,
            0.003
            );
// =========================
// ESTRELLAS
// =========================

const starsGeometry = new THREE.BufferGeometry();

const starsCount = 15000;

const positions = new Float32Array(starsCount * 3);

for(let i = 0; i < starsCount * 3; i++){

    positions[i] = (Math.random() - 0.5) * 2000;
}

starsGeometry.setAttribute(
    'position',
    new THREE.BufferAttribute(positions, 3)
);

const starsMaterial = new THREE.PointsMaterial({

    color: 0xffffff,

    size: 0.35,

    transparent: true
});

const stars = new THREE.Points(
    starsGeometry,
    starsMaterial
);

scene.add(stars);

            const camera =
                new THREE.PerspectiveCamera(

                    75,

                    window.innerWidth /
                    window.innerHeight,

                    0.1,

                    2000
                );

            const controls =
                new THREE.OrbitControls(
                    camera,
                    renderer.domElement
                );

            controls.enableDamping = true;

// =========================
// GALAXIA
// =========================

const galaxy = new THREE.Group();

scene.add(galaxy);

const starCount = 12000;

const geometry = new THREE.BufferGeometry();

const positionsGalaxy =
    new Float32Array(starCount * 3);

const colors = [];

for(let i = 0; i < starCount; i++){

    const i3 = i * 3;

    const radius = Math.pow(
        Math.random(),
        1.5
    ) * 80;

    const spinAngle = radius * 0.35;

    const branchAngle =
        (i % 5) * ((Math.PI * 2) / 5);

    const randomX =
        (Math.random() - 0.5) * 6;

    const randomY =
        (Math.random() - 0.5) * 2;

    const randomZ =
        (Math.random() - 0.5) * 6;

    positionsGalaxy[i3] =

        Math.cos(branchAngle + spinAngle)
        * radius
        + randomX;

    positionsGalaxy[i3 + 1] =

        randomY;

    positionsGalaxy[i3 + 2] =

        Math.sin(branchAngle + spinAngle)
        * radius
        + randomZ;

    // COLORES

    const mixedColor =
        new THREE.Color();

    mixedColor.setHSL(

        0.75 + Math.random() * 0.15,
        1,
        0.7
    );

    colors.push(

        mixedColor.r,
        mixedColor.g,
        mixedColor.b
    );
}

geometry.setAttribute(

    'position',

    new THREE.BufferAttribute(
        positionsGalaxy,
        3
    )
);

geometry.setAttribute(

    'color',

    new THREE.Float32BufferAttribute(
        colors,
        3
    )
);

const material =
    new THREE.PointsMaterial({

        size: 0.18,

        vertexColors: true,

        transparent: true,

        opacity: 0.9,

        blending:
            THREE.AdditiveBlending,

        depthWrite: false
    });

const particles =
    new THREE.Points(
        geometry,
        material
    );

galaxy.add(particles);



// =========================
// AGUJERO NEGRO
// =========================

// Esfera del horizonte de eventos: negro absoluto, sin brillo

const blackHole = new THREE.Mesh(

    new THREE.SphereGeometry(7, 64, 64),

    new THREE.MeshBasicMaterial({
        color: 0x000000
    })
);

scene.add(blackHole);

// =========================
// GLOW DETRÁS DEL HORIZONTE (efecto resplandor)
// =========================

function createGlowTexture(){

    const size = 512;

    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;

    const ctx = canvas.getContext('2d');

    const gradient = ctx.createRadialGradient(
        size/2, size/2, 0,
        size/2, size/2, size/2
    );

    gradient.addColorStop(0, 'rgba(255,200,255,1)');
    gradient.addColorStop(0.25, 'rgba(190,90,255,0.85)');
    gradient.addColorStop(0.55, 'rgba(120,40,255,0.35)');
    gradient.addColorStop(1, 'rgba(0,0,0,0)');

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, size, size);

    return new THREE.CanvasTexture(canvas);
}

const glowSprite = new THREE.Sprite(
    new THREE.SpriteMaterial({

        map: createGlowTexture(),

        transparent: true,

        blending: THREE.AdditiveBlending,

        depthWrite: false
    })
);

glowSprite.scale.set(60, 60, 1);

scene.add(glowSprite);

// =========================
// DISCO DE ACRECIÓN (textura tipo plasma)
// =========================

function createAccretionTexture(){

    const w = 1024, h = 64;

    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;

    const ctx = canvas.getContext('2d');

    const gradient = ctx.createLinearGradient(0, 0, w, 0);

    gradient.addColorStop(0.00, 'rgba(255,255,255,0)');
    gradient.addColorStop(0.08, 'rgba(255,230,200,0.9)');
    gradient.addColorStop(0.20, 'rgba(255,150,80,0.95)');
    gradient.addColorStop(0.40, 'rgba(255,90,150,0.9)');
    gradient.addColorStop(0.60, 'rgba(190,80,255,0.9)');
    gradient.addColorStop(0.80, 'rgba(110,60,255,0.7)');
    gradient.addColorStop(1.00, 'rgba(255,255,255,0)');

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);

    const texture = new THREE.CanvasTexture(canvas);

    texture.wrapS = THREE.RepeatWrapping;

    return texture;
}

const accretionTexture = createAccretionTexture();

const accretionDisk = new THREE.Mesh(

    new THREE.RingGeometry(9, 22, 128, 1),

    new THREE.MeshBasicMaterial({

        map: accretionTexture,

        side: THREE.DoubleSide,

        transparent: true,

        opacity: 0.95,

        blending: THREE.AdditiveBlending,

        depthWrite: false
    })
);

accretionDisk.rotation.x = Math.PI / 2;

scene.add(accretionDisk);

// Segundo disco, más fino y rápido, para dar sensación de capas

const accretionDisk2 = new THREE.Mesh(

    new THREE.RingGeometry(8, 12, 128, 1),

    new THREE.MeshBasicMaterial({

        map: accretionTexture,

        side: THREE.DoubleSide,

        transparent: true,

        opacity: 0.85,

        blending: THREE.AdditiveBlending,

        depthWrite: false
    })
);

accretionDisk2.rotation.x = Math.PI / 2;

scene.add(accretionDisk2);

// =========================
// PARTÍCULAS GIRANDO EN EL DISCO
// =========================

const diskParticlesCount = 4000;

const diskGeometry = new THREE.BufferGeometry();

const diskPositions = new Float32Array(diskParticlesCount * 3);

const diskColors = new Float32Array(diskParticlesCount * 3);

for(let i = 0; i < diskParticlesCount; i++){

    const i3 = i * 3;

    const radius = 8.5 + Math.random() * 14;

    const angle = Math.random() * Math.PI * 2;

    const height = (Math.random() - 0.5) * 0.6
        * (1 - (radius - 8.5) / 14);

    diskPositions[i3] = Math.cos(angle) * radius;
    diskPositions[i3 + 1] = height;
    diskPositions[i3 + 2] = Math.sin(angle) * radius;

    const heat = 1 - (radius - 8.5) / 14;

    const c = new THREE.Color();

    c.setHSL(
        0.08 - heat * 0.05 + (1 - heat) * 0.65,
        1,
        0.55 + heat * 0.3
    );

    diskColors[i3] = c.r;
    diskColors[i3 + 1] = c.g;
    diskColors[i3 + 2] = c.b;
}

diskGeometry.setAttribute(
    'position',
    new THREE.BufferAttribute(diskPositions, 3)
);

diskGeometry.setAttribute(
    'color',
    new THREE.BufferAttribute(diskColors, 3)
);

const diskMaterial = new THREE.PointsMaterial({

    size: 0.3,

    vertexColors: true,

    transparent: true,

    opacity: 0.9,

    blending: THREE.AdditiveBlending,

    depthWrite: false
});

const diskParticles = new THREE.Points(
    diskGeometry,
    diskMaterial
);

scene.add(diskParticles);

// =========================
// FRASES FLOTANDO
// =========================

const phrases = [

    "Fernanda 💛",
    "Mi Reina 👑",
    "Te Amo ♾️",
    "Mi Mundo 🌎",
    "Hermosa ✨",
    "Mi Cielito 🌌",
    "Mi Todo 💖",
    "Mi Niña Preciosa 💕",
    "Mi lugar seguro 🌠",
    "Mi Amor 💛",
    "Mi Diosa 💖",
    "Mi corazón de melón 🍈💕",
    "Mi Razón 🌹",
    "Mi Inspiración 🎶",
    "Mi Personita Favorita 🌎💕",
    "Ojitos Bonitos ✨",
    "Pedacito de Cielo ☁️✨",
    "Mi Estrella ⭐",
    "Mi Universo 🌙",
    "Mi Dulce Amor 🍯",
    "Mi Vida Entera ♾️",
    "Princesa Hermosa 👑",
    "Dueña de mi Corazón 💘",
    "Mi Felicidad 💫",
    "Mi Mayor Tesoro 💎",
    "Mi Casualidad Más Bonita 🍀",
    "Eres mi Hogar 🏠💞",
    "Sonrisa Perfecta 😍✨",
    "Mi Pensamiento Favorito 💭💛",
    "Mi Paz 🕊️💕",
    "Amor de mi Vida 🌹",
    "Fernanda 💛"

];

function createTextSprite(text){

    const canvas =
        document.createElement('canvas');

    const ctx =
        canvas.getContext('2d');

    canvas.width = 1024;
    canvas.height = 256;

    ctx.font = 'Bold 70px Arial';

    ctx.fillStyle = 'white';

    ctx.textAlign = 'center';

    ctx.fillText(
        text,
        canvas.width / 2,
        canvas.height / 2
    );

    const texture =
        new THREE.CanvasTexture(canvas);

    const material =
        new THREE.SpriteMaterial({

            map: texture,

            transparent: true
        });

    const sprite =
        new THREE.Sprite(material);

    sprite.scale.set(18,4.5,1);

    return sprite;
}

const textGroup = new THREE.Group();

scene.add(textGroup);

for(let i = 0; i < 40; i++){

    const phrase =
        phrases[
            Math.floor(
                Math.random() *
                phrases.length
            )
        ];

    const sprite =
        createTextSprite(phrase);

    const radius =
        20 + Math.random() * 60;

    const angle =
        Math.random() * Math.PI * 2;

    sprite.position.set(

        Math.cos(angle) * radius,

        (Math.random() - 0.5) * 12,

        Math.sin(angle) * radius
    );

    textGroup.add(sprite);
}

            // =========================
            // CÁMARA
            // =========================

            camera.position.set(0,22,75);

            // =========================
            // ANIMACIÓN
            // =========================

           function animate(){

    requestAnimationFrame(animate);

    stars.rotation.y += 0.0002;

    galaxy.rotation.y += 0.0008;

    textGroup.rotation.y += 0.0012;

    accretionDisk.rotation.z += 0.004;

    accretionDisk2.rotation.z -= 0.007;

    diskParticles.rotation.y += 0.005;

    glowSprite.material.opacity =
        0.75 + Math.sin(Date.now() * 0.0015) * 0.25;

    camera.position.x =
        Math.sin(Date.now() * 0.00008) * 8;

    camera.lookAt(scene.position);

    controls.update();

    renderer.render(scene, camera);
}

animate();

        })();

    </script>

</body>
</html>
